apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: argocd-clusterprofile-controller
    app.kubernetes.io/part-of: argocd
    app.kubernetes.io/component: clusterprofile-controller
  name: argocd-clusterprofile-controller
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-clusterprofile-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-clusterprofile-controller
    spec:
      containers:
        - args:
            - /usr/local/bin/argocd-clusterprofile-controller
          image: quay.io/argoproj/argocd:latest
          imagePullPolicy: Always
          name: argocd-clusterprofile-controller
          ports:
            - containerPort: 8080
              name: metrics
          env:
            - name: GRPC_ENABLE_TXT_SERVICE_CONFIG
              valueFrom:
                configMapKeyRef:
                  name: argocd-cmd-params-cm
                  key: clusterprofilecontroller.grpc.enable.txt.service.config
                  optional: true
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ARGOCD_CLUSTERPROFILE_CONTROLLER_ENABLE_LEADER_ELECTION
              valueFrom:
                configMapKeyRef:
                  key: clusterprofilecontroller.enable.leader.election
                  name: argocd-cmd-params-cm
                  optional: true
            - name: ARGOCD_CLUSTERPROFILE_CONTROLLER_DEBUG
              valueFrom:
                configMapKeyRef:
                  key: clusterprofilecontroller.debug
                  name: argocd-cmd-params-cm
                  optional: true
            - name: ARGOCD_CLUSTERPROFILE_CONTROLLER_LOGFORMAT
              valueFrom:
                configMapKeyRef:
                  key: clusterprofilecontroller.log.format
                  name: argocd-cmd-params-cm
                  optional: true
            - name: ARGOCD_CLUSTERPROFILE_CONTROLLER_LOGLEVEL
              valueFrom:
                configMapKeyRef:
                  key: clusterprofilecontroller.log.level
                  name: argocd-cmd-params-cm
                  optional: true
            - name: ARGOCD_LOG_FORMAT_TIMESTAMP
              valueFrom:
                configMapKeyRef:
                  name: argocd-cmd-params-cm
                  key: log.format.timestamp
                  optional: true
            - name: ARGOCD_K8S_CLIENT_QPS
              valueFrom:
                configMapKeyRef:
                  name: argocd-cmd-params-cm
                  key: clusterprofilecontroller.k8s.client.qps
                  optional: true
            - name: ARGOCD_K8S_CLIENT_BURST
              valueFrom:
                configMapKeyRef:
                  name: argocd-cmd-params-cm
                  key: clusterprofilecontroller.k8s.client.burst
                  optional: true
            - name: ARGOCD_K8S_CLIENT_MAX_IDLE_CONNECTIONS
              valueFrom:
                configMapKeyRef:
                  name: argocd-cmd-params-cm
                  key: clusterprofilecontroller.k8s.client.max.idle.connections
                  optional: true
            - name: ARGOCD_K8S_TCP_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: argocd-cmd-params-cm
                  key: clusterprofilecontroller.k8s.tcp.timeout
                  optional: true
            - name: ARGOCD_K8S_TCP_KEEPALIVE
              valueFrom:
                configMapKeyRef:
                  name: argocd-cmd-params-cm
                  key: clusterprofilecontroller.k8s.tcp.keepalive
                  optional: true
            - name: ARGOCD_K8S_TLS_HANDSHAKE_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: argocd-cmd-params-cm
                  key: clusterprofilecontroller.k8s.tls.handshake.timeout
                  optional: true
            - name: ARGOCD_K8S_TCP_IDLE_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: argocd-cmd-params-cm
                  key: clusterprofilecontroller.k8s.tcp.idle.timeout
                  optional: true
            - name: ARGOCD_CLUSTERPROFILE_CONTROLLER_DRY_RUN
              valueFrom:
                configMapKeyRef:
                  key: clusterprofilecontroller.dryrun
                  name: argocd-cmd-params-cm
                  optional: true
            - name: ARGOCD_CLUSTERPROFILE_CONTROLLER_NAMESPACES
              valueFrom:
                configMapKeyRef:
                  key: clusterprofilecontroller.namespaces
                  name: argocd-cmd-params-cm
                  optional: true
            - name: ARGOCD_CLUSTERPROFILE_CONTROLLER_ENABLE_CLUSTER_PROFILES
              valueFrom:
                configMapKeyRef:
                  name: argocd-cmd-params-cm
                  key: clusterprofilecontroller.enabled
                  optional: true
          volumeMounts:
            - mountPath: /tmp
              name: tmp
            - name: argocd-cmd-params-cm
              mountPath: /home/argocd/params
          securityContext:
            capabilities:
              drop:
                - ALL
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
      serviceAccountName: argocd-clusterprofile-controller
      volumes:
        - emptyDir: { }
          name: tmp
        - name: argocd-cmd-params-cm
          configMap:
            optional: true
            name: argocd-cmd-params-cm
      nodeSelector:
        kubernetes.io/os: linux
