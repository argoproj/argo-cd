name: Renovate

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: renovate-${{ github.repository }}
  cancel-in-progress: false

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-24.04
    if: github.repository == 'argoproj/argo-cd'
    timeout-minutes: 30

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ vars.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Keep renovate action, image, and version aligned.
      # If you bump the action version, verify the matching image/digest too.
      - name: Run self-hosted Renovate
        uses: renovatebot/github-action@3633cede7d4d4598438e654eac4a695e46004420 # v46.1.7
        with:
          configurationFile: .github/configs/renovate-config.js
          token: ${{ steps.app-token.outputs.token }}
          renovate-image: ghcr.io/renovatebot/renovate:43
          renovate-version: 43

        env:
          LOG_LEVEL: debug
          RENOVATE_REPOSITORIES: ${{ github.repository }}
