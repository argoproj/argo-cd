apiVersion: karpenter.sh/v1
kind: NodeClaim
metadata:
  name: default-xxxx
spec:
  nodeClassRef:
    group: karpenter.k8s.aws
    kind: EC2NodeClass
    name: default
  requirements:
    - key: karpenter.k8s.aws/instance-family
      operator: In
      values:
        - m5
status:
  conditions:
    - message: ""
      reason: Launched
      status: "True"
      type: Launched
    - message: ""
      reason: Registered
      status: "True"
      type: Registered
    - message: ""
      reason: Initialized
      status: "True"
      type: Initialized
    - message: "Instance i-0abc123def456789 terminated unexpectedly"
      reason: NotReady
      status: "False"
      type: Ready
