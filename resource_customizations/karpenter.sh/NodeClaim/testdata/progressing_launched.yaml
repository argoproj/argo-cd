apiVersion: karpenter.sh/v1
kind: NodeClaim
metadata:
  name: default-xxxx
spec:
  nodeClassRef:
    group: karpenter.k8s.aws
    kind: EC2NodeClass
    name: default
  requirements:
    - key: karpenter.k8s.aws/instance-family
      operator: In
      values:
        - m5
status:
  providerID: aws:///us-east-1a/i-0abc123def456789
  conditions:
    - message: ""
      reason: Launched
      status: "True"
      type: Launched
