Tests:
- HealthStatus:
    message: Initializing cluster SCM provider
    status: Progressing
  InputPath: testdata/no-status.yaml
- HealthStatus:
    message: 'ClusterScmProvider is being deleted. clusterscmprovider.promoter.argoproj.io/finalizer:
      Waiting until no GitRepository still references this cluster-wide SCM provider.
      Risk if removed manually: GitRepository objects can reference a provider that
      no longer exists.'
    status: Progressing
  InputPath: testdata/deleting.yaml
- HealthStatus:
    message: Waiting for ClusterScmProvider spec update to be observed
    status: Progressing
  InputPath: testdata/observed-generation-outdated.yaml
- HealthStatus:
    message: 'Cluster SCM provider validation failed: Reconciliation failed: invalid
      credentials'
    status: Degraded
  InputPath: testdata/reconcile-error.yaml
- HealthStatus:
    message: ClusterScmProvider Ready condition is missing
    status: Progressing
  InputPath: testdata/no-ready-condition.yaml
- HealthStatus:
    message: 'Cluster SCM provider readiness unknown (ValidationPending): Probing
      SCM endpoint'
    status: Progressing
  InputPath: testdata/ready-unknown.yaml
- HealthStatus:
    message: Cluster SCM provider is ready
    status: Healthy
  InputPath: testdata/healthy.yaml
- HealthStatus:
    message: ClusterScmProvider is being deleted.
    status: Progressing
  InputPath: testdata/terminating.yaml
