Tests:
- HealthStatus:
    message: Initializing Git repository
    status: Progressing
  InputPath: testdata/no-status.yaml
- HealthStatus:
    message: 'GitRepository is being deleted. gitrepository.promoter.argoproj.io/finalizer:
      Waiting until no non-deleting PullRequests still reference this repository.
      Risk if removed manually: repository metadata may be removed while promotions
      still depend on it.'
    status: Progressing
  InputPath: testdata/deleting.yaml
- HealthStatus:
    message: Waiting for GitRepository spec update to be observed
    status: Progressing
  InputPath: testdata/observed-generation-outdated.yaml
- HealthStatus:
    message: 'Git repository validation failed: Reconciliation failed: repository
      not found'
    status: Degraded
  InputPath: testdata/reconcile-error.yaml
- HealthStatus:
    message: GitRepository Ready condition is missing
    status: Progressing
  InputPath: testdata/no-ready-condition.yaml
- HealthStatus:
    message: 'Git repository readiness unknown (ValidationPending): Resolving repository
      metadata'
    status: Progressing
  InputPath: testdata/ready-unknown.yaml
- HealthStatus:
    message: Git repository is ready
    status: Healthy
  InputPath: testdata/healthy.yaml
- HealthStatus:
    message: GitRepository is being deleted.
    status: Progressing
  InputPath: testdata/terminating.yaml
