Tests:
- HealthStatus:
    message: Initializing SCM provider
    status: Progressing
  InputPath: testdata/no-status.yaml
- HealthStatus:
    message: 'ScmProvider is being deleted. scmprovider.promoter.argoproj.io/finalizer:
      Waiting until no GitRepository in this namespace still references this provider.
      Risk if removed manually: GitRepository objects can reference a provider that
      no longer exists.'
    status: Progressing
  InputPath: testdata/deleting.yaml
- HealthStatus:
    message: Waiting for ScmProvider spec update to be observed
    status: Progressing
  InputPath: testdata/observed-generation-outdated.yaml
- HealthStatus:
    message: 'SCM provider validation failed: Reconciliation failed: secret not found'
    status: Degraded
  InputPath: testdata/reconcile-error.yaml
- HealthStatus:
    message: ScmProvider Ready condition is missing
    status: Progressing
  InputPath: testdata/no-ready-condition.yaml
- HealthStatus:
    message: 'SCM provider readiness unknown (ValidationPending): Checking GitHub
      API connectivity'
    status: Progressing
  InputPath: testdata/ready-unknown.yaml
- HealthStatus:
    message: SCM provider is ready
    status: Healthy
  InputPath: testdata/healthy.yaml
- HealthStatus:
    message: ScmProvider is being deleted.
    status: Progressing
  InputPath: testdata/terminating.yaml
