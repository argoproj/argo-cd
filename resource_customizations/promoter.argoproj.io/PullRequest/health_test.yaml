Tests:
- HealthStatus:
    message: Initializing pull request
    status: Progressing
  InputPath: testdata/no-status.yaml
- HealthStatus:
    message: 'Pull request is being deleted. pullrequest.promoter.argoproj.io/finalizer:
      Waiting for SCM closure or reconciliation of the pull request. Risk if removed
      manually: the real PR can stay open after the CR is gone. changetransferpolicy.promoter.argoproj.io/pullrequest-finalizer:
      Waiting for the ChangeTransferPolicy to observe PR identity and state. Risk
      if removed manually: promotion status or history can be wrong or racy.'
    status: Progressing
  InputPath: testdata/deleting.yaml
- HealthStatus:
    message: Waiting for pull request spec update to be observed
    status: Progressing
  InputPath: testdata/observed-generation-outdated.yaml
- HealthStatus:
    message: 'Pull request reconciliation failed: Something went wrong'
    status: Degraded
  InputPath: testdata/reconciliation-error.yaml
- HealthStatus:
    message: 'Pull request reconciliation failed: Failed to create pull request: authentication
      failed'
    status: Degraded
  InputPath: testdata/non-reconciliation-error.yaml
- HealthStatus:
    message: Pull request is not ready yet
    status: Progressing
  InputPath: testdata/no-ready-condition.yaml
- HealthStatus:
    message: Pull request is healthy
    status: Healthy
  InputPath: testdata/healthy-no-id-or-state.yaml
- HealthStatus:
    message: Pull request is open as PR 123
    status: Healthy
  InputPath: testdata/healthy-with-id-and-state.yaml
- HealthStatus:
    message: Pull request is being deleted.
    status: Progressing
  InputPath: testdata/terminating.yaml
