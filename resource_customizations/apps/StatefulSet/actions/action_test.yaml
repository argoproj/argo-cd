actionTests:
  - action: restart
    inputPath: testdata/statefulset.yaml
    expectedOutputPath: testdata/statefulset-restarted.yaml
  - action: scale
    inputPath: testdata/statefulset.yaml
    expectedOutputPath: testdata/statefulset-scaled.yaml
    parameters:
      replicas: '6'
  - action: scale
    inputPath: testdata/statefulset.yaml
    expectedErrorMessage: 'replicas parameter is required'
  - action: scale
    inputPath: testdata/statefulset.yaml
    expectedErrorMessage: 'invalid number: not_a_number (must be >= 0)'
    parameters:
      replicas: 'not_a_number'
