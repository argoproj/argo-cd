tests:
  - healthStatus:
      status: Progressing
      message: "No status available"
    inputPath: testdata/progressing_nostatus.yaml
  - healthStatus:
      status: Healthy
      message: "ExecHook enabled"
    inputPath: testdata/healthy.yaml
  - healthStatus:
      status: Suspended
      message: "ExecHook disabled"
    inputPath: testdata/suspended.yaml
  - healthStatus:
      status: Progressing
      message: "Pending deletion; blocked by finalizers: example.com/finalizer"
    inputPath: testdata/terminating.yaml
