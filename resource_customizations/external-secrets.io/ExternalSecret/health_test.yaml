tests:
  - healthStatus:
      status: Progressing
      message: Waiting for ExternalSecret
    inputPath: testdata/progressing.yaml
  - healthStatus:
      status: Degraded
      message: 'could not get secret data from provider: key "secret/sa/example" from ExternalSecret "test-degraded"'
    inputPath: testdata/degraded.yaml
  - healthStatus:
      status: Healthy
      message: 'Secret was synced'
    inputPath: testdata/healthy.yaml
  - healthStatus:
      status: Progressing
      message: "Pending deletion; blocked by finalizers: example.com/finalizer"
    inputPath: testdata/terminating.yaml
