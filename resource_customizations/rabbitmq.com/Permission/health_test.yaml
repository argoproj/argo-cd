tests:
- healthStatus:
    status: Degraded
    message: RabbitMQ permission failed to be created or updated
  inputPath: testdata/degraded.yaml
- healthStatus:
    status: Unknown
    message: RabbitMQ permission status is unknown
  inputPath: testdata/unknown.yaml
- healthStatus:
    status: Healthy
    message: RabbitMQ permission ready
  inputPath: testdata/healthy.yaml
- healthStatus:
    status: Progressing
    message: "Pending deletion; blocked by finalizers: example.com/finalizer"
  inputPath: testdata/terminating.yaml
