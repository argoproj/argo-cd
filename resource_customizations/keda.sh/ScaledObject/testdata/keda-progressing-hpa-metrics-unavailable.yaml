apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  finalizers:
    - finalizer.keda.sh
  labels:
    argocd.argoproj.io/instance: keda-default
  name: keda
  namespace: keda
spec:
  maxReplicaCount: 3
  minReplicaCount: 1
  scaleTargetRef:
    name: keda
  triggers:
    - metadata:
        type: Utilization
        value: '70'
      type: cpu
status:
  conditions:
    - message: 'ScaledObject is configured correctly but HPA is not healthy: FailedGetResourceMetric'
      reason: HPAMetricsUnavailable
      status: 'False'
      type: Ready
    - message: Scaling is not performed because triggers are not active
      reason: ScalerNotActive
      status: 'False'
      type: Active
    - message: No fallbacks are active on this scaled object
      reason: NoFallbackFound
      status: 'False'
      type: Fallback
    - status: Unknown
      type: Paused
  externalMetricNames:
    - s0-cpu
  hpaName: keda-hpa
  originalReplicaCount: 1
  scaleTargetGVKR:
    group: apps
    kind: Deployment
    resource: deployments
    version: v1