tests:
- healthStatus:
    status: Healthy
    message: "CronJobSucess Success"
  inputPath: testdata/ok.yaml
- healthStatus:
    status: Degraded
    message: "CronJobScheduled Failed"
  inputPath: testdata/failed.yaml
- healthStatus:
    status: Progressing
    message: "Pending deletion; blocked by finalizers: example.com/finalizer"
  inputPath: testdata/terminating.yaml
