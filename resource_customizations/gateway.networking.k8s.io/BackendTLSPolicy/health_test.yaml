tests:
- healthStatus:
    status: Healthy
    message: "BackendTLSPolicy is healthy"
  inputPath: testdata/healthy.yaml
- healthStatus:
    status: Degraded
    message: "Ancestor example-gateway: Referenced CA certificate ConfigMap 'default/example-ca' does not exist"
  inputPath: testdata/degraded_resolved_refs.yaml
- healthStatus:
    status: Degraded
    message: "Ancestor example-gateway: BackendTLSPolicy has invalid wellKnownCACertificates value, must be 'System'"
  inputPath: testdata/degraded_accepted.yaml
- healthStatus:
    status: Progressing
    message: "Waiting for BackendTLSPolicy status"
  inputPath: testdata/progressing.yaml
- healthStatus:
    status: Progressing
    message: "Waiting for Ancestor example-gateway to update BackendTLSPolicy status"
  inputPath: testdata/progressing_observed_generation.yaml
