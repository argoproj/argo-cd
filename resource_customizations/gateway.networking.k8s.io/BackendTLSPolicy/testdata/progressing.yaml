apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: example-backendtlspolicy
  namespace: default
spec:
  targetRefs:
  - group: ''
    kind: Service
    name: example-service
    namespace: default
  validation:
    caCertificateRefs:
    - group: ''
      kind: ConfigMap
      name: example-ca
    hostname: www.example.com
status:
  ancestors:
  - ancestorRef:
      group: gateway.networking.k8s.io
      kind: Gateway
      name: example-gateway
    conditions: []
    controllerName: example.com/gatewayclass-controller
