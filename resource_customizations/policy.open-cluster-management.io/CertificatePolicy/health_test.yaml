tests:
  - healthStatus:
      status: Progressing
      message: Waiting for the status to be reported
    inputPath: testdata/progressing_no_status.yaml
  - healthStatus:
      status: Degraded
      message: At least once certificate does not comply with the policy
    inputPath: testdata/degraded.yaml
  - healthStatus:
      status: Healthy
      message: All certificates found comply with the policy
    inputPath: testdata/healthy.yaml
  - healthStatus:
      status: Progressing
      message: "Pending deletion; blocked by finalizers: example.com/finalizer"
    inputPath: testdata/terminating.yaml
