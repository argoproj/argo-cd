apiVersion: capsule.clastix.io/v1beta2
kind: TenantResource
metadata:
  name: solar-tenantresource
  namespace: solar-production
spec:
  resyncPeriod: 60s
  resources:
    - namespaceSelector:
        matchLabels:
          capsule.clastix.io/tenant: solar
      rawItems:
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: shared-config
          data:
            key: value
