tests:
- healthStatus:
    status: Progressing
    message: "Waiting for status"
  inputPath: testdata/progressing_no_status.yaml
- healthStatus:
    status: Healthy
    message: "ResourcePoolClaim is bound and ready"
  inputPath: testdata/healthy.yaml
- healthStatus:
    status: Degraded
    message: "ResourcePoolClaim failed to bind"
  inputPath: testdata/degraded.yaml
- healthStatus:
    status: Suspended
    message: "Waiting for a pool to accept the claim"
  inputPath: testdata/suspended_unbound.yaml
