tests:
- healthStatus:
    status: Progressing
    message: "Waiting for status"
  inputPath: testdata/progressing_no_status.yaml
- healthStatus:
    status: Healthy
    message: "ResourcePool is active and within limits"
  inputPath: testdata/healthy.yaml
- healthStatus:
    status: Degraded
    message: "ResourcePool failed to reconcile"
  inputPath: testdata/degraded_ready_false.yaml
- healthStatus:
    status: Degraded
    message: "Pool exhausted for: cpu, memory"
  inputPath: testdata/degraded_exhausted.yaml
