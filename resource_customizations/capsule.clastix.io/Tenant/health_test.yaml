tests:
- healthStatus:
    status: Progressing
    message: "Waiting for status"
  inputPath: testdata/progressing_no_status.yaml
- healthStatus:
    status: Progressing
    message: "Waiting for reconciliation (generation mismatch)"
  inputPath: testdata/progressing_generation_mismatch.yaml
- healthStatus:
    status: Healthy
    message: "Tenant has been successfully reconciled"
  inputPath: testdata/healthy.yaml
- healthStatus:
    status: Degraded
    message: "Tenant failed to reconcile"
  inputPath: testdata/degraded.yaml
- healthStatus:
    status: Suspended
    message: "Tenant is cordoned"
  inputPath: testdata/suspended_cordoned.yaml
