apiVersion: addons.projectcapsule.dev/v1alpha1
kind: GlobalSopsSecret
metadata:
  name: global-tls-ca
spec:
  namespaceSelector:
    matchLabels:
      capsule.clastix.io/tenant: solar
  secretTemplates:
    - name: tls-ca
      stringData:
        ca.crt: ENC[AES256_GCM,data:encrypted==,tag:tag==,type:str]
