tests:
- healthStatus:
    status: Progressing
    message: "Waiting for status"
  inputPath: testdata/progressing_no_status.yaml
- healthStatus:
    status: Progressing
    message: "Waiting for reconciliation (generation mismatch)"
  inputPath: testdata/progressing_generation_mismatch.yaml
- healthStatus:
    status: Progressing
    message: "Decryption in progress"
  inputPath: testdata/progressing_unknown.yaml
- healthStatus:
    status: Healthy
    message: "All managed secrets have been successfully decrypted and replicated"
  inputPath: testdata/healthy.yaml
- healthStatus:
    status: Degraded
    message: "Failed to decrypt secret"
  inputPath: testdata/degraded.yaml
