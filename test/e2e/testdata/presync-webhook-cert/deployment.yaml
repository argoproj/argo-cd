apiVersion: apps/v1
kind: Deployment
metadata:
  name: presync-repro-main
spec:
  replicas: 1
  selector:
    matchLabels:
      app: presync-repro-main
  template:
    metadata:
      labels:
        app: presync-repro-main
    spec:
      containers:
        - name: main
          image: quay.io/argoprojlabs/argocd-e2e-container:0.1
          imagePullPolicy: IfNotPresent
          command: ["sleep", "infinity"]
