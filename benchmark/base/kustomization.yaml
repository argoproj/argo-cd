apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

# Use official Argo CD manifests as base
resources:
  - https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
# Note: guestbook-app.yaml is applied separately after CRDs are ready (see setup script)

# Image to replace in all deployments
# Match the exact image reference from the official manifest
images:
  - name: quay.io/argoproj/argocd
    newName: ttl.sh/argocd-incremental-ns-sync
    newTag: latest
